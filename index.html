<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Global Earth Map - Full Features</title>

    <!-- Google Maps API (replace YOUR_API_KEY) -->
    <script>
        (function() {
            const script = document.createElement('script');
            script.src = 'https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_API_KEY&libraries=places,geometry&loading=async';
            script.async = true;
            script.defer = true;
            script.onerror = function() {
                alert('Google Maps failed to load. Please check your API key and internet connection.');
            };
            document.head.appendChild(script);
        })();
    </script>

    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f8f9fa;
            --text-primary: #202124;
            --text-secondary: #5f6368;
            --border-color: #e0e0e0;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.08);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.15), 0 2px 6px rgba(0,0,0,0.1);
            --shadow-lg: 0 8px 30px rgba(0,0,0,0.2), 0 4px 12px rgba(0,0,0,0.12);
            --accent: #1a73e8;
            --accent-hover: #1557b0;
            --danger: #ea4335;
            --danger-hover: #c5221f;
            --success: #0f9d58;
            --warning: #f9ab00;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 24px;
            --radius-xl: 28px;
            --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
            --font-family: 'Google Sans', 'Roboto', 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            background: #e8eaed;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            user-select: none;
            -webkit-user-select: none;
        }

        /* 🔥 Fully hide all Google branding */
        .gm-style-cc,
        .gm-style-mtc,
        .gm-svpc,
        a[target="_blank"][href^="https://maps.google.com"],
        a[href^="https://www.google.com/intl"],
        .gmnoprint:not(.gm-bundled-control),
        .gm-style > div > a[title^="Click to see this area"],
        .gm-style-iw-chr,
        .gm-style-iw-d {
            display: none !important;
            visibility: hidden !important;
            opacity: 0 !important;
            height: 0 !important;
            width: 0 !important;
            position: absolute !important;
            left: -9999px !important;
            top: -9999px !important;
        }

        /* Hide any Google logo or copyright that might be injected */
        .gm-style > div:first-child > div:last-child,
        .gm-style > div:nth-child(2) > div:last-child {
            display: none !important;
        }

        /* Map container */
        #map {
            height: 100vh;
            width: 100vw;
            z-index: 1;
            cursor: grab;
        }
        #map:active {
            cursor: grabbing;
        }
        #map.crosshair-mode {
            cursor: crosshair;
        }

        /* Top Bar */
        .top-bar {
            position: fixed;
            top: 16px;
            left: 16px;
            right: 16px;
            z-index: 1000;
            display: flex;
            gap: 12px;
            align-items: flex-start;
            pointer-events: none;
        }
        .top-bar > * {
            pointer-events: auto;
        }

        /* Search */
        .search-container {
            flex: 1;
            max-width: 480px;
            min-width: 200px;
            position: relative;
        }
        .search-wrapper {
            display: flex;
            align-items: center;
            background: var(--bg-primary);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-md);
            padding: 0 16px;
            height: 50px;
            gap: 12px;
            transition: var(--transition);
            border: 2px solid transparent;
        }
        .search-wrapper:focus-within {
            box-shadow: var(--shadow-lg);
            border-color: var(--accent);
        }
        .search-icon {
            flex-shrink: 0;
            width: 20px;
            height: 20px;
            color: var(--text-secondary);
        }
        .search-icon svg {
            width: 100%;
            height: 100%;
        }
        #searchInput {
            flex: 1;
            border: none;
            outline: none;
            font-size: 15px;
            font-family: var(--font-family);
            color: var(--text-primary);
            background: transparent;
            min-width: 0;
            letter-spacing: 0.2px;
        }
        #searchInput::placeholder {
            color: #9aa0a6;
        }
        .search-clear {
            flex-shrink: 0;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: none;
            background: #e8eaed;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: var(--text-secondary);
            transition: var(--transition);
        }
        .search-clear:hover {
            background: #d2d5d9;
            color: var(--text-primary);
        }
        .search-clear.visible {
            display: flex;
        }
        .search-divider {
            width: 1px;
            height: 24px;
            background: var(--border-color);
            flex-shrink: 0;
        }
        .search-mic {
            flex-shrink: 0;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            transition: var(--transition);
            font-size: 18px;
        }
        .search-mic:hover {
            background: #e8f0fe;
        }

        .search-suggestions {
            position: absolute;
            top: 58px;
            left: 0;
            right: 0;
            background: var(--bg-primary);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
            max-height: 380px;
            overflow-y: auto;
            display: none;
            z-index: 1001;
            border: 1px solid var(--border-color);
        }
        .search-suggestions.active {
            display: block;
        }
        .suggestion-item {
            padding: 12px 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: var(--transition);
            border-bottom: 1px solid #f1f3f4;
        }
        .suggestion-item:last-child {
            border-bottom: none;
        }
        .suggestion-item:hover {
            background: #f1f3f4;
        }
        .suggestion-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #e8f0fe;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 14px;
            color: var(--accent);
        }
        .suggestion-text {
            flex: 1;
            min-width: 0;
        }
        .suggestion-title {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .suggestion-subtitle {
            font-size: 12px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .suggestion-no-results {
            padding: 20px;
            text-align: center;
            color: var(--text-secondary);
            font-size: 14px;
        }

        /* Layer Switcher */
        .layer-switcher {
            display: flex;
            background: var(--bg-primary);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-md);
            padding: 4px;
            gap: 2px;
            height: 50px;
            align-items: center;
            flex-shrink: 0;
        }
        .layer-btn {
            padding: 8px 16px;
            border: none;
            background: transparent;
            cursor: pointer;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            font-family: var(--font-family);
            color: var(--text-primary);
            transition: var(--transition);
            white-space: nowrap;
            letter-spacing: 0.2px;
        }
        .layer-btn:hover {
            background: #f1f3f4;
        }
        .layer-btn.active {
            background: #e8f0fe;
            color: var(--accent);
            font-weight: 600;
        }

        /* Side Controls */
        .side-controls {
            position: fixed;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .ctrl-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: var(--bg-primary);
            box-shadow: var(--shadow-md);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: var(--text-primary);
            transition: var(--transition);
            position: relative;
        }
        .ctrl-btn:hover {
            background: #f1f3f4;
            box-shadow: var(--shadow-lg);
            color: var(--accent);
        }
        .ctrl-btn.tooltip::after {
            content: attr(data-tooltip);
            position: absolute;
            right: 54px;
            background: #3c4043;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-family: var(--font-family);
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: var(--transition);
            font-weight: 500;
            letter-spacing: 0.3px;
        }
        .ctrl-btn.tooltip:hover::after {
            opacity: 1;
        }
        .ctrl-btn.pulse {
            animation: pulse-ring 2s infinite;
        }
        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(26,115,232,0.5); }
            70% { box-shadow: 0 0 0 12px rgba(26,115,232,0); }
            100% { box-shadow: 0 0 0 0 rgba(26,115,232,0); }
        }

        /* Bottom coordinates */
        .bottom-info {
            position: fixed;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(32,33,36,0.9);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-family: var(--font-family);
            letter-spacing: 0.3px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            gap: 16px;
            align-items: center;
        }
        .bottom-info.visible {
            opacity: 1;
        }

        /* Click info card */
        .click-info-card {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            z-index: 1000;
            background: var(--bg-primary);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            opacity: 0;
            pointer-events: none;
            transition: all 0.35s cubic-bezier(0.4,0,0.2,1);
            max-width: 90vw;
            border: 1px solid var(--border-color);
        }
        .click-info-card.visible {
            opacity: 1;
            pointer-events: auto;
            transform: translateX(-50%) translateY(0);
        }
        .info-btn {
            padding: 6px 14px;
            border-radius: 16px;
            border: none;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            font-family: var(--font-family);
            transition: var(--transition);
            white-space: nowrap;
        }
        .copy-btn {
            background: #e8f0fe;
            color: var(--accent);
        }
        .close-btn {
            background: #f1f3f4;
            color: var(--text-primary);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .top-bar {
                gap: 8px;
                flex-wrap: wrap;
            }
            .search-container {
                max-width: 100%;
                flex: 1 1 100%;
                order: 1;
            }
            .layer-switcher {
                order: 2;
                height: 40px;
                border-radius: 20px;
                padding: 3px;
            }
            .layer-btn {
                padding: 6px 11px;
                font-size: 12px;
            }
            .side-controls {
                right: 8px;
                gap: 6px;
            }
            .ctrl-btn {
                width: 38px;
                height: 38px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <!-- Top Bar -->
    <div class="top-bar">
        <div class="search-container">
            <div class="search-wrapper">
                <span class="search-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
                    </svg>
                </span>
                <input type="text" id="searchInput" placeholder="Search places, addresses, landmarks..." autocomplete="off">
                <button class="search-clear" id="searchClear" title="Clear">✕</button>
                <span class="search-divider"></span>
                <button class="search-mic" id="voiceSearchBtn" title="Voice search">🎤</button>
            </div>
            <div class="search-suggestions" id="searchSuggestions"></div>
        </div>

        <div class="layer-switcher" id="layerSwitcher">
            <button class="layer-btn active" data-layer="roadmap">🗺️ Map</button>
            <button class="layer-btn" data-layer="satellite">🛰️ Satellite</button>
            <button class="layer-btn" data-layer="terrain">⛰️ Terrain</button>
        </div>
    </div>

    <!-- Side Controls -->
    <div class="side-controls">
        <button class="ctrl-btn tooltip" data-tooltip="Find my location" id="locateBtn">◎</button>
        <button class="ctrl-btn tooltip" data-tooltip="Fullscreen" id="fullscreenBtn">⛶</button>
        <button class="ctrl-btn tooltip" data-tooltip="Reset view" id="resetBtn">🔄</button>
        <button class="ctrl-btn tooltip" data-tooltip="Clear pins" id="clearPinsBtn">🗑️</button>
        <button class="ctrl-btn tooltip" data-tooltip="Crosshair mode" id="crosshairBtn">⊕</button>
    </div>

    <!-- Bottom Coordinates -->
    <div class="bottom-info" id="bottomInfo">
        <span>Lat <span id="dispLat">—</span></span>
        <span>Lng <span id="dispLng">—</span></span>
        <span>Zoom <span id="dispZoom">—</span></span>
    </div>

    <!-- Click Info Card -->
    <div class="click-info-card" id="clickInfoCard">
        <div style="width:36px;height:36px;border-radius:50%;background:#fce8e6;display:flex;align-items:center;justify-content:center;">📍</div>
        <div style="flex:1;min-width:0;">
            <div id="infoAddress" style="font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">Address</div>
            <div id="infoCoords" style="font-size:11px;color:#5f6368;"></div>
        </div>
        <div style="display:flex;gap:6px;">
            <button class="info-btn copy-btn" id="copyCoordsBtn">Copy</button>
            <button class="info-btn close-btn" id="closeInfoCard">Close</button>
        </div>
    </div>

    <script>
        (function() {
            // Wait for Google Maps to load
            window.initMap = function() {
                // Create map with no UI
                const map = new google.maps.Map(document.getElementById('map'), {
                    center: { lat: 20, lng: 0 },
                    zoom: 2.5,
                    minZoom: 2,
                    maxZoom: 19,
                    mapTypeId: 'roadmap',
                    disableDefaultUI: true,
                    zoomControl: false,
                    streetViewControl: false,
                    fullscreenControl: false,
                    mapTypeControl: false,
                    scaleControl: false,
                    rotateControl: false,
                    clickableIcons: false,
                    gestureHandling: 'greedy',
                    styles: [
                        // Optional: slight customization to hide any remaining watermarks
                        {
                            featureType: "all",
                            elementType: "labels",
                            stylers: [{ visibility: "on" }] // keep labels
                        }
                    ]
                });

                // HIDE ALL GOOGLE BRANDING (runs after map is fully loaded)
                function hideGoogleBranding() {
                    const elements = document.querySelectorAll(
                        '.gm-style-cc, a[href^="https://maps.google.com"], ' +
                        'a[href^="https://www.google.com/intl"], .gmnoprint:not(.gm-bundled-control), ' +
                        '.gm-style > div > a[title^="Click to see this area"]'
                    );
                    elements.forEach(el => {
                        el.style.display = 'none';
                        el.style.visibility = 'hidden';
                        el.style.opacity = '0';
                        el.remove(); // More aggressive removal
                    });
                    // Remove any Google logo image
                    const imgs = document.querySelectorAll('.gm-style img[src*="google"], .gm-style img[src*="copyright"]');
                    imgs.forEach(img => img.remove());
                }
                google.maps.event.addListenerOnce(map, 'tilesloaded', hideGoogleBranding);
                setInterval(hideGoogleBranding, 2000); // periodic cleanup

                // Add custom zoom controls (we'll use side buttons, but also need +/-)
                // We'll bind side buttons to zoom

                // ========== LAYER SWITCHING ==========
                const layerBtns = document.querySelectorAll('.layer-btn');
                layerBtns.forEach(btn => {
                    btn.addEventListener('click', () => {
                        const type = btn.dataset.layer;
                        map.setMapTypeId(type);
                        layerBtns.forEach(b => b.classList.remove('active'));
